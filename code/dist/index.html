fn main(@builtin(global_invocation_id) GlobalInvocationID : vec3<u32>) {\r
  let canvas_size: vec2<i32> = vec2<i32>(textureDimensions(colorBuffer));  // canvas_size == [800, 400]\r
  let aspect_ratio: f32 = f32(canvas_size.x) / f32(canvas_size.y);  \r
\r
  let canvas_pos: vec2<i32> = vec2<i32>(i32(GlobalInvocationID.x), i32(GlobalInvocationID.y));\r
\r
  if (canvas_pos.x >= canvas_size.x || canvas_pos.y >= canvas_size.y) {return;}\r
  var uv: vec2<f32> = (vec2f(GlobalInvocationID.xy) + 0.5) / vec2<f32>(canvas_size) ;\r
  var seed: u32 = GlobalInvocationID.x + GlobalInvocationID.y * u32(renderData.imageWidth)\r
  + (renderData.frameCount * 131071u);\r
  let pixel_index = GlobalInvocationID.y * renderData.imageWidth + GlobalInvocationID.x;\r
  var ndc: vec2<f32> = (uv * 2.0) - 1.0;\r
  ndc.y = -ndc.y; // Range(ndc.y) = [1.0, -1.0] <-- flipped because texture coords are automatically mirrored\r
\r
  /*\r
    Box shader converts camera position from world coordinates\r
    to ndc in vertex shader.\r
    Need to convert from ndc to world coordinates so that it is synchronized with the\r
    box shader\r
  */\r
  var screen_pos = vec4<f32>(ndc.x, ndc.y, 1.0, 1.0); // Near plane\r
  var world_target = cameraData.inverseViewProjectionMatrix * screen_pos;\r
  var world_pos = world_target.xyz / world_target.w;\r
  var myRay: Ray;\r
  myRay.origin = cameraData.cameraPos;\r
  myRay.direction = normalize(world_pos - myRay.origin);\r
\r
  var outputColor: vec3<f32>;\r
  var resultHitRecord: HitRecord;\r
  if (renderData.temporalAccumulation == 1u) {\r
    // Temporal Accumulation\r
\r
    resultHitRecord = rayColor(myRay, &seed);\r
    outputColor = resultHitRecord.color;\r
\r
    if (renderData.frameCount == 1u) {\r
      // First frame: store the color\r
      outputColor = resultHitRecord.color;\r
    } else {\r
      // Subsequent frames: Blend with previous data\r
      let old_color = accumulationBuffer[pixel_index].rgb;\r
      \r
      /*\r
        Weighed Average\r
        When frameCount is 1, output color is weighed completely\r
        towards old_color which on that frame is just the buffer\r
        from frame 0. \r
      */\r
      let weight = 1.0 / f32(renderData.frameCount);\r
      outputColor = mix(old_color, resultHitRecord.color, weight);\r
    }\r
    accumulationBuffer[pixel_index] = vec4<f32>(outputColor, 1.0);\r
\r
   \r
  } else {\r
    resultHitRecord = rayColor(myRay,  &seed);\r
  // resultHitRecord.color = myRay.direction;\r
    // write to accumulationBuffer to prevent stale data from appearing\r
    // for the first frame when the accumulation buffer is turned on\r
    accumulationBuffer[pixel_index] = vec4<f32>(outputColor, 1.0);\r
\r
    outputColor = resultHitRecord.color;\r
   \r
  }\r
  // textureStore(colorBuffer, canvas_pos, vec4<f32>(outputColor, 1.0));\r
  // textureStore(depthBuffer, canvas_pos, vec4<f32>(10000, 0.0, 0.0, 0.0));\r
 if (renderData.hasGammaCorrection == 1) {\r
      outputColor = sqrt(outputColor);\r
    }\r
  /* \r
    Stores the outputColor from the rayTracer in the color buffer that will be rendered to the screen in\r
    the fragment shader fs (in textureShader.wgsl).\r
  */\r
  textureStore(colorBuffer, canvas_pos, vec4<f32>(outputColor, 1.0));\r
\r
   /* \r
    Stores the depth value the ray tracer calculates for the first ray (before scattering),\r
    which is represented by resultHitRecord.t, in the depth buffer. This is needed for using a depth\r
    test on the BVH boxes so that the part of the wireframe box behind a sphere is not visible \r
    (only if depthTestBVH == 1). \r
    If the ray misses a sphere, the depth value of 10000 is used which should be farther than the far plane\r
  */\r
  // textureStore(depthBuffer, canvas_pos, vec4<f32>(resultHitRecord.t, 0.0, 0.0, 0.0));\r
  if (resultHitRecord.hitAnything == true) {\r
    textureStore(depthBuffer, canvas_pos, vec4<f32>(resultHitRecord.t, 0.0, 0.0, 0.0));\r
  } else {\r
    textureStore(depthBuffer, canvas_pos, vec4<f32>(10000, 0.0, 0.0, 0.0));\r
\r
  }\r
  \r
}\r

fn rayColor(ray: Ray, seed: ptr<function, u32>) -> HitRecord {\r
  var throughput = vec3<f32>(1.0, 1.0, 1.0);\r
  var resultingColor = vec3<f32>(0.0);\r
  var nearestHit: f32 = 9999;\r
\r
  var currentRay: Ray = ray;\r
  let maxDepth: u32 = 2;\r
  var resultHitRecord: HitRecord;\r
  resultHitRecord.hitAnything = false;\r
  var firstHitCaptured = false;\r
  for (var depth: u32 = 0; depth < renderData.numRayBounces; depth++) {\r
    var hitRecord: HitRecord;\r
    var nearestHit = 10000.0;\r
\r
    if (renderData.useBVH == 0){ // looping through each object\r
      var nextIdx: u32 = 0;\r
      if (hitTriangle(currentRay, trianglesData.triangles[0], 0.001, nearestHit, &hitRecord)) {nearestHit = hitRecord.t;}\r
      if (hitTriangle(currentRay, trianglesData.triangles[1], 0.001, nearestHit, &hitRecord)) {nearestHit = hitRecord.t;}\r
      for (var i: u32 = 0; i < spheresData.sphereCount; i++) {\r
        if (hit(currentRay, spheresData.spheres[i], 0.001, nearestHit, &hitRecord)) {\r
          nearestHit = hitRecord.t;\r
        }\r
      }\r
    } else if (renderData.useBVH == 1) { // BVH traversal with stack -- slower\r
      if (hitBVH(currentRay, &hitRecord)) {\r
\r
        nearestHit = hitRecord.t;\r
      }\r
      \r
    } \r
    \r
     // interpolated between white and skycolor based on currentRay.direction.y\r
    let t = 0.5 * (currentRay.direction.y + 1.0);\r
    let skyColor = (1.0 - t) * vec3(1.0, 1.0, 1.0) + t * spheresData.skyColor;\r
    if (hitRecord.hitAnything == true) {\r
      if (!firstHitCaptured) { \r
        // used to record the t value for the hit on the actual sphere\r
        // needed for depth testing the boxes so that visually we cant see lines behind the sphere\r
        resultHitRecord.t = hitRecord.t;\r
        firstHitCaptured = true;\r
      }\r
\r
      var scatterDirection: vec3<f32>;\r
      let diffuseDir = normalize(hitRecord.normal + randomUnitVector(seed));\r
      let reflectDir = normalize(reflect(currentRay.direction, hitRecord.normal) \r
        + hitRecord.fuzz * randomOnHemisphere(hitRecord.normal, seed));\r
\r
      if (hitRecord.material == 0) {  // matte\r
        \r
        if (renderData.diffuseType == 0) {// simple diffuse - matte\r
          scatterDirection = randomOnHemisphere(hitRecord.normal, seed);\r
        } else {// lambertian - matte\r
          scatterDirection = normalize(hitRecord.normal + randomUnitVector(seed));\r
        }\r
        throughput *= hitRecord.color * 0.5;\r
\r
      } else if (hitRecord.material == 1) { // metallic\r
        // reflectDir: currentRay.direction  - dot(currentRay.direction, hitRecord.normal) * hitRecord.normal;\r
        \r
        // scatterDirection = reflect(normalize(currentRay.direction), normalize(hitRecord.normal))\r
        //   + hitRecord.fuzz * randomOnHemisphere(hitRecord.normal, seed);\r
       scatterDirection = mix(diffuseDir, reflectDir, hitRecord.reflectivity);\r
        // throughput *=  ((1.0 - t) * vec3(1.0, 1.0, 1.0) + t * skyColor);\r
        // let color = ((1.0 - t) * vec3(1.0, 1.0, 1.0) + t * skyColor);\r
        // throughput *= color * mix(0.5, 1.0, hitRecord.reflectivity);\r
        throughput *= skyColor * mix(0.0, 1.0, hitRecord.reflectivity)\r
        + hitRecord.color * mix(1.0, 0.0, hitRecord.reflectivity);\r
\r
      } else if (hitRecord.material == 2) { // refractive material\r
        /* \r
          if dot(currentRay.direction, hitRecord.normal) < 0.0\r
          then the ray is opposite to the normal, which means it is\r
          going into the sphere, so the ray is outward.\r
          Otherwise the ray is inside the sphere\r
        */\r
        let isEnteringMaterial: bool =  dot(currentRay.direction, hitRecord.normal) < 0.0;\r
        \r
        let normal = select(\r
          -hitRecord.normal,\r
          hitRecord.normal,        \r
          isEnteringMaterial\r
        );\r
\r
        let airReflectivity = 1.0; // Note: the index of refraction of air is 1.0\r
\r
        /*\r
          Assuming theta is the angle between the normal and incoming light, and theta' is\r
          angle between -normal and outgoing light across boundary:\r
          If the ray is in air, the fraction of the index of refaction of light\r
          going from the air to the sphere is airReflectivity / hitRecord.refractivity.\r
          \r
          So snell's law is \r
          sin(theta') = (airReflectivity / hitRecord.refractivity) * sin(theta)\r
        \r
          Otherwise, the roles of theta and theta' is reversed (same for fraction)\r
          Snell's law is \r
          sin(theta) = (hitRecord.refractivity / airReflectivity) * sin(theta')\r
        */\r
        let ri: f32 = select(\r
           \r
          hitRecord.refractivity / airReflectivity,  \r
          airReflectivity / hitRecord.refractivity,\r
          isEnteringMaterial\r
        );\r
        let c = min(dot(-currentRay.direction, normal), 1.0);\r
        let s = sqrt(1.0 -  c * c);\r
        let cannotRefract: bool = ri * s > 1.0;\r
        var direction: vec3<f32>;\r
        \r
        if (cannotRefract || reflectance(c, ri) > randomFloat(seed)) {\r
         \r
        \r
          scatterDirection = mix(diffuseDir, reflectDir, hitRecord.reflectivity);\r
\r
          // scatterDirection = reflect(\r
          //   currentRay.direction,\r
          //   hitRecord.normal,\r
          // );\r
          // scatterDirection = reflect(currentRay.direction,  normal);\r
          \r
          throughput *= skyColor * mix(0.0, 1.0, hitRecord.reflectivity)\r
           + hitRecord.color * mix(1.0, 0.0, hitRecord.reflectivity);\r
          // throughput *= vec3f(1.0,1.0,1.0);\r
          // throughput *= 0.1 * hitRecord.color;\r
        } else {\r
          scatterDirection = refract(\r
            currentRay.direction,\r
             normal,\r
            ri\r
          );\r
          // throughput *= 0.5*hitRecord.color;\r
          // throughput *= skyColor * mix(0.0, 1.0, hitRecord.reflectivity)\r
          //   + hitRecord.color * mix(1.0, 0.0, hitRecord.refractivity);\r
          throughput *= vec3f(1.0,1.0,1.0);\r
\r
        }\r
\r
      }\r
      currentRay.origin = hitRecord.position; // + (hitRecord.normal * 0.001);\r
      currentRay.direction = normalize(scatterDirection);\r
    } else {\r
      // miss every object and hits sky, break out of loop to prevent next bounce\r
\r
      resultingColor = throughput * skyColor;\r
      break;\r
    }\r
    resultingColor = throughput * skyColor;\r
    resultHitRecord.hitAnything = hitRecord.hitAnything;\r
    if (max(throughput.r, max(throughput.g, throughput.b)) < 0.001) {\r
      break;\r
    }\r
\r
  }\r
  resultHitRecord.color = resultingColor;\r
\r
  return resultHitRecord;\r
}\r
fn reflectance(c: f32, refractionIndex: f32) -> f32 {\r
    // Schlick's approximation for reflectance.\r
    var r0 = (1.0 - refractionIndex) / (1.0 + refractionIndex);\r
    r0 = r0 * r0;\r
    return r0 + (1.0 - r0) * pow((1.0 - c), 5.0);\r
}\r
fn hit(ray: Ray, sphere: Sphere, tMin: f32, tMax: f32, \r
  outHitRecord: ptr<function, HitRecord>) -> bool  {\r
  let co: vec3<f32> = ray.origin - sphere.position;\r
  let a: f32 = dot(ray.direction, ray.direction);\r
  let b: f32 = 2.0 * dot(ray.direction, co);\r
  let c: f32 = dot(co, co) - sphere.radius * sphere.radius;\r
  let discriminant: f32 = b * b - 4.0 * a * c;\r
\r
  if (discriminant > 0.0) {\r
\r
    let t: f32 = (-b - sqrt(discriminant)) / (2 * a);\r
\r
    if (t > tMin && t < tMax) {\r
      (*outHitRecord).t = t;\r
      (*outHitRecord).position = ray.origin + t * ray.direction;\r
      (*outHitRecord).normal = normalize(((*outHitRecord).position - sphere.position));\r
      (*outHitRecord).color = sphere.color;\r
      (*outHitRecord).material = sphere.material;\r
      (*outHitRecord).fuzz = sphere.fuzz;\r
      (*outHitRecord).reflectivity = sphere.reflectivity;\r
      (*outHitRecord).refractivity = sphere.refractivity;\r
\r
      (*outHitRecord).hitAnything = true;\r
      return true;\r
    }\r
  }\r
  // (*outHitRecord).t = 3.0e+38; // close to infinity on miss\r
  return false;\r
}\r
fn hitTriangle(ray: Ray, tri: Triangle, t_min: f32, t_max: f32, outHitRecord: ptr<function, HitRecord>) -> bool {\r
    // var rec: HitRecord;\r
    // rec.hitAnything = false;\r
\r
    let edge1 = tri.v1 - tri.v0;\r
    let edge2 = tri.v2 - tri.v0;\r
    let h = cross(ray.direction, edge2);\r
    let a = dot(edge1, h);\r
\r
    if (a > -0.000001 && a < 0.000001) { return false; } // Ray is parallel\r
\r
    let f = 1.0 / a;\r
    let s = ray.origin - tri.v0;\r
    let u = f * dot(s, h);\r
\r
    if (u < 0.0 || u > 1.0) { return false; }\r
\r
    let q = cross(s, edge1);\r
    let v = f * dot(ray.direction, q);\r
\r
    if (v < 0.0 || u + v > 1.0) { return false; }\r
\r
    let t = f * dot(edge2, q);\r
\r
    if (t > t_min && t < t_max) {\r
        (*outHitRecord).t = t;\r
        (*outHitRecord).position = ray.origin + t * ray.direction;\r
        (*outHitRecord).normal = tri.normal;\r
        (*outHitRecord).material = tri.material;\r
        (*outHitRecord).reflectivity = tri.reflectivity;\r
        (*outHitRecord).refractivity = tri.refractivity;\r
\r
        (*outHitRecord).hitAnything = true;\r
\r
        // \r
        if (renderData.enableCheckerBoard == 1) {\r
          let scale = 1.0; // Size of checks\r
          let checker = (floor((*outHitRecord).position.x * scale) + floor((*outHitRecord).position.z * scale)) % 2.0;\r
          var color = vec3<f32>(0.0);\r
          if (abs(checker) < 0.001) {\r
            (*outHitRecord).color  = vec3<f32>(1.0); // White\r
          } else {\r
            (*outHitRecord).color  = vec3<f32>(0.0); // Black\r
          }\r
        } else {\r
          (*outHitRecord).color = tri.color;\r
        }\r
       \r
        return true;\r
    }\r
    return false;\r
}\r
\r
fn hitBVH(ray: Ray, outHitRecord: ptr<function, HitRecord>) -> bool { // 0.001, 10000\r
  (*outHitRecord).hitAnything = false;\r
  // t represents distance to nearest object hit so far. initialized to +infinity\r
  var closestT: f32 = 3.0e+38; \r
  var stack: array<u32, 32>; // Max depth of 32 is enough for 2^32 scene objects\r
  var stackPtr: i32 = 0;\r
  stack[0] = 0; // Start at root \r
  let invD = 1.0 / ray.direction; // only 1 division calculation\r
\r
  var bvhHitRecord: HitRecord;\r
  bvhHitRecord.hitAnything = false;\r
  var leafHitRecord: HitRecord;\r
  leafHitRecord.hitAnything = false;\r
  leafHitRecord.t = closestT; // represents the nearest ray-sphere intersection hit\r
  var nodesTouched = 0u;\r
  while (stackPtr >= 0) {\r
    nodesTouched++;\r
    let nodeIdx: u32 = stack[stackPtr];\r
    let node: BVHNode = bvh.nodes[nodeIdx];\r
    stackPtr--;\r
    \r
    if (!hitAABB(ray, invD, node.min, node.max, closestT, &bvhHitRecord)) {\r
      continue; \r
    } \r
    if (bvhHitRecord.t > closestT) {\r
      continue;\r
    }\r
    // if (node.objectIndex < -0.0001) { // internal node\r
    if (node.objectIndex == -1.0) { // internal node\r
      let left_node = bvh.nodes[u32(node.leftChild)];\r
      let right_node = bvh.nodes[u32(node.rightChild)];\r
      var leftHitRecord: HitRecord;\r
      var rightHitRecord: HitRecord;\r
      hitAABB(ray, invD, left_node.min, left_node.max, closestT, &leftHitRecord);\r
      hitAABB(ray, invD, right_node.min, right_node.max, closestT, &rightHitRecord);\r
      // Push the one that is further away first, so the closer one is popped first\r
      if (leftHitRecord.t < rightHitRecord.t){\r
        if (rightHitRecord.t < closestT) { \r
          stackPtr++; stack[stackPtr] = u32(node.rightChild); \r
        }\r
        if (leftHitRecord.t < closestT) { \r
          stackPtr++; stack[stackPtr] = u32(node.leftChild); \r
        }\r
      } else {\r
        if (rightHitRecord.t < closestT) { \r
          stackPtr++; stack[stackPtr] = u32(node.rightChild); \r
        }\r
        if (leftHitRecord.t < closestT) { \r
          stackPtr++; stack[stackPtr] = u32(node.leftChild); \r
        }\r
      }\r
      // hitAABB(ray, invD, node.min, node.max, &bvhHitRecord);\r
      // stackPtr++;\r
      // stack[stackPtr] = u32(node.rightChild);\r
      // stackPtr++;\r
      // stack[stackPtr] = u32(node.leftChild);\r
      if (stackPtr > 30) { break; }\r
    } else { // leaf node\r
      let index = u32(node.objectIndex);\r
      if (index == 0 || index == 1 ) {\r
        if (hitTriangle(ray, trianglesData.triangles[index], 0.001, closestT, &leafHitRecord)) {\r
          (*outHitRecord) = leafHitRecord;\r
          closestT = leafHitRecord.t;\r
\r
        }\r
      } else {\r
        if (hit(ray, spheresData.spheres[index-2], 0.001, closestT, &leafHitRecord)) { \r
        //if ray intersects spherex\r
        (*outHitRecord) = leafHitRecord;\r
        closestT = leafHitRecord.t;\r
      }\r
      }\r
      \r
    }\r
  }  \r
  // (*outHitRecord).color = vec3(f32(nodesTouched) / 10.0, 0.0, 0.0);\r
\r
  return (*outHitRecord).hitAnything;\r
}\r
fn hitAABB(ray: Ray, invD: vec3<f32>, node_min: vec3<f32>, node_max: vec3<f32>,\r
      closestT: f32, outHitRecord: ptr<function, HitRecord> ) -> bool {\r
    let t0 = (node_min - ray.origin) * invD;\r
    let t1 = (node_max - ray.origin) * invD;\r
    \r
    let t_min_v = min(t0, t1);\r
    let t_max_v = max(t0, t1);\r
    \r
    let t_min = max(max(t_min_v.x, t_min_v.y), t_min_v.z);\r
    let t_max = min(min(t_max_v.x, t_max_v.y), t_max_v.z);\r
    \r
    let hit_t = max(t_min, 0.0);\r
    \r
    if (t_max >= t_min && t_max > 0.0 \r
      && hit_t < closestT) {\r
      (*outHitRecord).hitAnything = true;\r
      (*outHitRecord).t = hit_t;\r
      return true;\r
    }\r
    return false;\r
}\r

\r
fn pcgHash(input: u32) -> u32 {\r
    var state = input * 747796405u + 2891336453u;\r
    var word = ((state >> ((state >> 28u) + 4u)) ^ state) * 277803737u;\r
    return (word >> 22u) ^ word;\r
}\r
\r
// Returns a random float in [0.0, 1.0)\r
fn randomFloat(seed: ptr<function, u32>) -> f32 {\r
    *seed = pcgHash(*seed);\r
    // Divide by 2^32 - 1\r
    return f32(*seed) / 4294967295.0;\r
}\r
\r
// Returns a random float in [min, max)\r
fn randomRange(min: f32, max: f32, seed: ptr<function, u32>) -> f32 {\r
    return min + (max - min) * randomFloat(seed);\r
}\r
\r
fn randomVec3(min: f32, max: f32, seed: ptr<function, u32>) -> vec3<f32> {\r
    return vec3<f32>(\r
        randomRange(min, max, seed),\r
        randomRange(min, max, seed),\r
        randomRange(min, max, seed)\r
    );\r
}\r
\r
fn randomUnitVector(seed: ptr<function, u32>) -> vec3<f32> {\r
    // use a loop with a limit to prevent GPU threads from being blocked\r
    for (var i = 0; i < 100; i++) {\r
        let p = randomVec3(-1.0, 1.0, seed);\r
        let lensq = dot(p,p);\r
        \r
        // Check if point is inside the unit sphere but not at the exact center\r
        if (lensq > 1e-24 && lensq <= 1.0) {\r
            return p / sqrt(lensq);\r
        }\r
    }\r
    return vec3<f32>(0.0, 1.0, 0.0); // Fallback\r
}\r
\r
\r
fn randomOnHemisphere(normal: vec3<f32>, seed: ptr<function, u32>) -> vec3<f32> {\r
    let onUnitSphere = randomUnitVector(seed);\r
    if (dot(onUnitSphere, normal) > 0.0) {\r
        return onUnitSphere;\r
    } else {\r
        return -onUnitSphere;\r
    }\r

<body>
<div id="container">
  <div id="diagnostics">

    <h4>ms / frame: <span id="frame-time"></span> ms</h4>
    <h4>Frames / Second: <span id="fps"></span></h4>
    <div id="object-controls" class="control-group">
      <h3>Object Controls</h3>
      

    </div>
    
  </div>
  <div id="canvas-container">
    <h1 id="fallback"></h1>

    <canvas id="GLCanvas" width="800" height="600"></canvas>
    
    <div class="control-group">
      <h3>Camera Controls</h3>
      <label for="fov">Field of View: <span id="fov-val"></span></label> </br>
      <input type="range" id="fov" class="range" name="fov" min="60" max="120" value="90">
      <label for="sens">Mouse Sensitivity: <span id="sens-val"></span></label> </br>
      <input type="range" id="sens" class="range" name="sens" min="0.0001" max="0.01" step= "0.0001" value="0.004"></br>
      <button id="reset-camera">Reset Camera</button >
    </div>

  </div>
  <div id="controls">

    <div class="control-group">
      <h3>BVH</h3>
      <button id="toggleBVH-btn" class="toggle-btn ">Toggle BVH</button> </d>

      <h3>BVH Visual</h3>
      <button id="showBVHBoxes-btn" class="toggle-btn ">Toggle BVH Boxes Visual</button>
      <button id="hideRootBVHBox-btn" class="toggle-btn ">Hide Root BVH Boxes</button> </br>
      <button id="depthBVH-btn" class="toggle-btn active">Depth test on BVH Boxes</button> 
    </div>
    <div class="control-group">
      <h3>Acceleration Structures</h3>
      <button id="temporalAccumulation-btn" class="toggle-btn ">Toggle Temporal Accumulation</button>
      <button id="accumulateFrames-btn" class="toggle-btn">Accumulate Frames</button>

     
    </div>
    <div class="control-group">
      <h3>Scene Controls</h3>
      <input type="radio" id="scene1" name="scene" value="1" checked>
      <label for="scene">Scene 1</label>

      </br>
      <input type="radio" id="scene2" name="scene" value="2" >
      <label for="scene">Scene 2</label> </br>
      <label for="numSpheres">Number of Spheres: <span id="numSpheres-val"></span></label> </br>
      <input type="range" id="numSpheres" class="range" name="numSpheres" min="2" max="500" value="5">
    </div>
  
    <div class="control-group">
      <label for="diffuseType">Lighting: </label>
      <br/>
      <button id="hasGammaCorrection-btn" class="toggle-btn active">Toggle Gamma Correction</button>
      <br/>
      <div>
      Sky Color: <input type="color" id="skyColorInput" >
      <button id="reset-skyColor">Reset</button >
    </div>
      <select name="diffuseType" id="diffuseType">
        <option value="0" selected>Simple Diffuse</option>
        <option value="1">Lambertian</option>

      </select>
      <div class="control-group">
        <label for="bounces">Number of Ray Bounces: <span id="bounces-val"></span></label> </br>
        <input type="range" id="bounces" class="range" name="bounces" min="1" max="100" value="10">
      </div>
    </div>
    
  </div>
</div>
</body>

</html>
