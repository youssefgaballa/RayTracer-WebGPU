<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebGPU Ray Tracer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script type="module" defer src="/src/main.ts"></script>
</head>
<body>
<div id="container">
  <div id="diagnostics">

    <h4>ms per frame: <span id="frame-time"></span> ms</h4>
    <h4>Frames per Second: <span id="fps"></span></h4>
  </div>
  <div id="canvas-container">
    <canvas id="GLCanvas" width="1000" height="800"></canvas>
    <div class="control-group">
      <label for="fov">Field of View: <span id="fov-val"></span></label> </br>
      <input type="range" id="fov" name="fov" min="60" max="120" value="90">
    </div>
    <h1 id="fallback"></h1>

  </div>
  <div id="controls">
    
    <button id="temporalAccumulation-btn" class="toggle-btn active">Toggle Temporal Accumulation</button>
    
    <div class="control-group">
      <label for="diffuseType">Diffuse type: </label>
      <br/>
      <select name="diffuseType" id="diffuseType">
        <option value="0" selected>Simple Diffuse</option>
        <option value="1">Lambertian</option>

      </select>
    </div>

    <button id="hasGammaCorrection-btn" class="toggle-btn active">Toggle Gamma Correction</button>
    </br>
    <button id="showBVHBoxes-btn" class="toggle-btn active">Toggle BVH Boxes</button>
    <button id="hideRootBVHBox-btn" class="toggle-btn active">Hide Root BVH Boxes</button>

   

  </div>
</div>
</body>

</html>
