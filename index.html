<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebGPU Ray Tracer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script type="module" defer src="/src/main.ts"></script>
</head>
<body>
<div id="container">
  <div id="diagnostics">

    <h4>ms / frame: <span id="frame-time"></span> ms</h4>
    <h4>Frames / Second: <span id="fps"></span></h4>
    <div id="object-controls" class="control-group">
      <h3>Object Controls</h3>
      

    </div>
  </div>
  <div id="canvas-container">
    <h1 id="fallback"></h1>

    <canvas id="GLCanvas" width="1000" height="800"></canvas>
    <div class="control-group">
      <label for="fov">Field of View: <span id="fov-val"></span></label> </br>
      <input type="range" id="fov" class="range" name="fov" min="60" max="120" value="90">
    </div>
    <div class="control-group">
      <label for="numSpheres">Number of Spheres: <span id="numSpheres-val"></span></label> </br>
      <input type="range" id="numSpheres" class="range" name="numSpheres" min="2" max="500" value="5">
    </div>

  </div>
  <div id="controls">

    <div class="control-group">
      <h3>BVH</h3>
      <button id="toggleBVH-btn" class="toggle-btn ">Toggle BVH</button> </d>
      <button id="toggleStacklessBVH-btn" class="toggle-btn ">Toggle Stackless BVH</button> </br>

      <h3>BVH Visual</h3>
      <button id="showBVHBoxes-btn" class="toggle-btn active">Toggle BVH Boxes Visual</button>
      <button id="hideRootBVHBox-btn" class="toggle-btn ">Hide Root BVH Boxes</button> </br>
      <button id="depthBVH-btn" class="toggle-btn active">Depth test on BVH Boxes</button> 
    </div>
    <div class="control-group">
      <h3>Acceleration Structures</h3>
      <button id="temporalAccumulation-btn" class="toggle-btn active">Toggle Temporal Accumulation</button>
      <button id="accumulateFrames-btn" class="toggle-btn">Accumulate Frames</button>

     
    </div>
    <div class="control-group">
      <h3>Scene Controls</h3>
      <input type="radio" id="scene1" name="scene" value="1" checked>
      <label for="scene">Scene 1</label>

      </br>
      <input type="radio" id="scene2" name="scene" value="2" >
      <label for="scene">Scene 2</label>

    </div>
  
    <div class="control-group">
      <label for="diffuseType">Lighting: </label>
      <br/>
      <button id="hasGammaCorrection-btn" class="toggle-btn active">Toggle Gamma Correction</button>
      <br/>
      <button id="enableScattering-btn" class="toggle-btn active">Enable Scattering</button>
      <br/>
      <div>
      Sky Color: <input type="color" id="skyColorInput" >
      <button id="reset-skyColor">Reset</button >
    </div>
      <select name="diffuseType" id="diffuseType">
        <option value="0" selected>Simple Diffuse</option>
        <option value="1">Lambertian</option>

      </select>
    </div>
    
  </div>
</div>
</body>

</html>
